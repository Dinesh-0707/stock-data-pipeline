version: 2

models:
  - name: stg_stock_prices
    description: "Cleaned and standardised stock price data from silver layer"
    columns:
      - name: symbol
        description: "Stock ticker symbol"
        tests:
          - not_null
          - accepted_values:
              values: ['AAPL', 'MSFT', 'GOOGL', 'AMZN', 'META']
      - name: date
        description: "Trading date"
        tests:
          - not_null
      - name: close
        description: "Closing price"
        tests:
          - not_null
      - name: volume
        description: "Trading volume"
        tests:
          - not_null

  - name: mart_daily_summary
    description: "Business ready daily summary with performance labels"
    columns:
      - name: symbol
        tests:
          - not_null
      - name: daily_return_pct
        tests:
          - not_null
